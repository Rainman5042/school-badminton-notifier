<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏸 羽球場地公告監控</title>
    <meta name="description" content="學校羽球場地公告自動監控儀表板，即時追蹤場地租用資訊">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ========== CSS Reset & Variables ========== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --bg-card: #1a2035;
            --bg-card-hover: #1f2847;
            --bg-glass: rgba(26, 32, 53, 0.7);
            --border-color: rgba(255, 255, 255, 0.06);
            --border-glow: rgba(0, 212, 170, 0.3);

            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;

            --accent: #00d4aa;
            --accent-light: #34eac5;
            --accent-dark: #00a88a;
            --accent-glow: rgba(0, 212, 170, 0.15);

            --warning: #f59e0b;
            --error: #ef4444;
            --info: #3b82f6;
            --success: #10b981;

            --gradient-primary: linear-gradient(135deg, #00d4aa 0%, #00b4d8 50%, #7c3aed 100%);
            --gradient-card: linear-gradient(145deg, rgba(26, 32, 53, 0.9), rgba(17, 24, 39, 0.95));
            --gradient-shimmer: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);

            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px rgba(0, 212, 170, 0.1);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;

            --font-sans: 'Inter', 'Noto Sans TC', -apple-system, sans-serif;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ========== Background Effects ========== */
        .bg-effects {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-effects .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            animation: float 20s ease-in-out infinite;
        }

        .bg-effects .orb-1 {
            width: 600px; height: 600px;
            background: var(--accent);
            top: -200px; right: -100px;
            animation-delay: 0s;
        }

        .bg-effects .orb-2 {
            width: 400px; height: 400px;
            background: #7c3aed;
            bottom: -100px; left: -100px;
            animation-delay: -7s;
        }

        .bg-effects .orb-3 {
            width: 300px; height: 300px;
            background: #00b4d8;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* ========== Layout ========== */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* ========== Header ========== */
        header {
            padding: 40px 0 32px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-md);
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            box-shadow: var(--shadow-md), var(--shadow-glow);
        }

        .logo-text h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 2px;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .meta-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 100px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .meta-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 212, 170, 0.4); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0, 212, 170, 0); }
        }

        /* ========== Stats Row ========== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: var(--gradient-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px 24px;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--border-glow);
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .stat-card .stat-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-card .stat-value {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .stat-card .stat-icon {
            position: absolute;
            top: 16px;
            right: 20px;
            font-size: 22px;
            opacity: 0.6;
        }

        .stat-card.accent .stat-value { color: var(--accent); }
        .stat-card.info .stat-value { color: var(--info); }
        .stat-card.warning .stat-value { color: var(--warning); }
        .stat-card.success .stat-value { color: var(--success); }

        /* ========== Control Panel ========== */
        .control-panel {
            background: var(--gradient-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            padding: 28px 32px;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .control-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gradient-primary);
            opacity: 0.5;
        }

        .control-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }

        .control-header h2 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .option-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: var(--transition);
        }

        .toggle-slider::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--text-secondary);
            top: 2px;
            left: 2px;
            transition: var(--transition);
        }

        .toggle-switch input:checked + .toggle-slider {
            background: var(--accent-dark);
            border-color: var(--accent);
        }

        .toggle-switch input:checked + .toggle-slider::after {
            transform: translateX(20px);
            background: var(--accent-light);
        }

        .option-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .btn-check {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 36px;
            font-size: 15px;
            font-weight: 600;
            font-family: var(--font-sans);
            color: var(--bg-primary);
            background: var(--gradient-primary);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        .btn-check::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--gradient-shimmer);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 212, 170, 0.3);
        }

        .btn-check:active {
            transform: translateY(0);
        }

        .btn-check:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-check:disabled .spinner {
            display: inline-block;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(10, 14, 26, 0.3);
            border-top-color: var(--bg-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== Status Bar ========== */
        .status-bar {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            margin-top: 16px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .status-bar.info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #93c5fd;
        }

        .status-bar.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .status-bar.warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.2);
            color: #fcd34d;
        }

        .status-bar.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        /* ========== Results Section ========== */
        .results-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title .count-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 26px;
            height: 26px;
            padding: 0 8px;
            border-radius: 100px;
            background: var(--accent-glow);
            color: var(--accent);
            font-size: 13px;
            font-weight: 700;
        }

        .announcement-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .announcement-card {
            background: var(--gradient-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px 24px;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .announcement-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--gradient-primary);
            opacity: 0;
            transition: var(--transition);
        }

        .announcement-card:hover {
            border-color: var(--border-glow);
            background: var(--bg-card-hover);
            transform: translateX(4px);
        }

        .announcement-card:hover::before {
            opacity: 1;
        }

        .ann-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .ann-title a {
            color: inherit;
            text-decoration: none;
            transition: var(--transition);
        }

        .ann-title a:hover {
            color: var(--accent);
        }

        .ann-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .ann-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
        }

        .ann-tag.school {
            background: rgba(59, 130, 246, 0.1);
            color: #93c5fd;
            border: 1px solid rgba(59, 130, 246, 0.15);
        }

        .ann-tag.keyword {
            background: var(--accent-glow);
            color: var(--accent-light);
            border: 1px solid rgba(0, 212, 170, 0.15);
        }

        .ann-tag.date {
            background: rgba(148, 163, 184, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(148, 163, 184, 0.15);
        }

        /* ========== Empty State ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto;
        }

        /* ========== Pipeline Visual ========== */
        .pipeline-visual {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 8px;
            margin-top: 16px;
        }

        .pipeline-visual.visible {
            display: grid;
        }

        .pipeline-step {
            text-align: center;
            padding: 14px 8px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            position: relative;
            transition: var(--transition);
        }

        .pipeline-step .step-num {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pipeline-step .step-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--accent);
            margin: 4px 0;
        }

        .pipeline-step .step-label {
            font-size: 11px;
            color: var(--text-muted);
        }

        .pipeline-step::after {
            content: '→';
            position: absolute;
            right: -14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            z-index: 2;
        }

        .pipeline-step:last-child::after {
            content: none;
        }

        /* ========== Schools List ========== */
        .school-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 12px;
        }

        .school-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 13px;
            color: var(--text-secondary);
            transition: var(--transition);
        }

        .school-chip:hover {
            border-color: var(--border-glow);
            color: var(--text-primary);
        }

        .school-chip .school-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
        }

        /* ========== Footer ========== */
        footer {
            padding: 32px 0;
            text-align: center;
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }

        footer p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* ========== Responsive ========== */
        @media (max-width: 640px) {
            header { padding: 24px 0 20px; }
            .header-content { flex-direction: column; align-items: flex-start; }
            .control-panel { padding: 20px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .pipeline-visual { grid-template-columns: repeat(2, 1fr); }
            .pipeline-step::after { content: none; }
            .btn-check { width: 100%; justify-content: center; }
            .announcement-card { padding: 16px; }
        }

        /* ========== Animations ========== */
        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-enter {
            animation: cardEnter 0.4s ease forwards;
        }

        @keyframes cardEnter {
            from { opacity: 0; transform: translateX(-12px); }
            to { opacity: 1; transform: translateX(0); }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">🏸</div>
                    <div class="logo-text">
                        <h1>羽球場地公告監控</h1>
                        <p>自動監控學校場地租用公告</p>
                    </div>
                </div>
                <div class="header-meta">
                    <div class="meta-badge">
                        <span class="dot"></span>
                        <span id="school-count-badge">監控中</span>
                    </div>
                    <div class="meta-badge">
                        📅 每日 12:00 自動檢查
                    </div>
                </div>
            </div>
        </header>

        <!-- Stats Row -->
        <div class="stats-row" id="stats-row">
            <div class="stat-card accent">
                <div class="stat-label">監控學校</div>
                <div class="stat-value" id="stat-schools">-</div>
                <div class="stat-icon">🏫</div>
            </div>
            <div class="stat-card info">
                <div class="stat-label">爬取公告</div>
                <div class="stat-value" id="stat-fetched">-</div>
                <div class="stat-icon">📊</div>
            </div>
            <div class="stat-card warning">
                <div class="stat-label">關鍵字命中</div>
                <div class="stat-value" id="stat-matched">-</div>
                <div class="stat-icon">🎯</div>
            </div>
            <div class="stat-card success">
                <div class="stat-label">新公告</div>
                <div class="stat-value" id="stat-new">-</div>
                <div class="stat-icon">🔔</div>
            </div>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <div class="control-header">
                <h2>⚡ 手動檢查</h2>
            </div>

            <div class="control-options">
                <div class="option-group">
                    <label class="toggle-switch">
                        <input type="checkbox" id="opt-dryrun" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="option-label">預覽模式（不發送通知）</span>
                </div>
                <div class="option-group">
                    <label class="toggle-switch">
                        <input type="checkbox" id="opt-force" checked>
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="option-label">顯示所有匹配（含已通知）</span>
                </div>
            </div>

            <button class="btn-check" id="btn-check" onclick="runCheck()">
                <span class="spinner" id="btn-spinner"></span>
                <span id="btn-text">🔍 立即檢查</span>
            </button>

            <!-- Pipeline Visualization -->
            <div class="pipeline-visual" id="pipeline">
                <div class="pipeline-step">
                    <div class="step-num">Step 1</div>
                    <div class="step-value" id="pipe-total">-</div>
                    <div class="step-label">爬取公告</div>
                </div>
                <div class="pipeline-step">
                    <div class="step-num">Step 2</div>
                    <div class="step-value" id="pipe-date">-</div>
                    <div class="step-label">30天內</div>
                </div>
                <div class="pipeline-step">
                    <div class="step-num">Step 3</div>
                    <div class="step-value" id="pipe-keyword">-</div>
                    <div class="step-label">關鍵字命中</div>
                </div>
                <div class="pipeline-step">
                    <div class="step-num">Step 4</div>
                    <div class="step-value" id="pipe-new">-</div>
                    <div class="step-label">新公告</div>
                </div>
            </div>

            <!-- Status Bar -->
            <div class="status-bar" id="status-bar">
                <span id="status-icon"></span>
                <span id="status-text"></span>
            </div>
        </div>

        <!-- Results Section -->
        <div class="results-section" id="results-section" style="display: none;">
            <div class="section-title">
                📋 匹配的場地公告
                <span class="count-badge" id="result-count">0</span>
            </div>
            <div class="announcement-list" id="announcement-list"></div>
        </div>

        <!-- Empty State (initial) -->
        <div class="empty-state" id="empty-state">
            <div class="empty-icon">🏸</div>
            <h3>點擊「立即檢查」開始</h3>
            <p>系統會爬取所有監控學校的最新公告，過濾出一個月內與場地相關的資訊</p>
        </div>

        <!-- Schools Section -->
        <div class="results-section fade-in">
            <div class="section-title">
                🏫 監控學校列表
                <span class="count-badge" id="schools-count">0</span>
            </div>
            <div class="school-grid" id="school-grid"></div>
        </div>

        <footer>
            <p>🏸 羽球場地公告監控機器人 · 自動排程每日台北時間 12:00 執行</p>
        </footer>
    </div>

    <script>
        // ========== Init ==========
        document.addEventListener('DOMContentLoaded', loadStatus);

        async function loadStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();

                // Populate schools
                document.getElementById('school-count-badge').textContent = `${data.school_count} 所學校監控中`;
                document.getElementById('stat-schools').textContent = data.school_count;
                document.getElementById('schools-count').textContent = data.school_count;

                const grid = document.getElementById('school-grid');
                grid.innerHTML = data.schools.map(name => `
                    <div class="school-chip">
                        <span class="school-dot"></span>
                        ${name}
                    </div>
                `).join('');

                // If there's a last result, display it
                if (data.last_result) {
                    displayResult(data.last_result);
                }
            } catch (e) {
                console.error('Failed to load status:', e);
            }
        }

        async function runCheck() {
            const btn = document.getElementById('btn-check');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');

            // Disable button
            btn.disabled = true;
            btnText.textContent = '檢查中...';
            spinner.style.display = 'inline-block';

            // Show loading status
            showStatus('info', '⏳', '正在爬取所有學校的公告，請稍候...');

            // Hide previous results
            document.getElementById('results-section').style.display = 'none';
            document.getElementById('empty-state').style.display = 'none';

            const dryRun = document.getElementById('opt-dryrun').checked;
            const force = document.getElementById('opt-force').checked;

            try {
                const res = await fetch('/api/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dry_run: dryRun, force: force }),
                });

                if (res.status === 429) {
                    showStatus('warning', '⏳', '另一個檢查正在進行中，請稍候...');
                    return;
                }

                const data = await res.json();

                if (data.error) {
                    showStatus('error', '❌', data.error);
                    return;
                }

                displayResult(data);

            } catch (e) {
                showStatus('error', '❌', `檢查失敗: ${e.message}`);
            } finally {
                btn.disabled = false;
                btnText.textContent = '🔍 立即檢查';
                spinner.style.display = 'none';
            }
        }

        function displayResult(data) {
            // Update stats
            document.getElementById('stat-fetched').textContent = data.total_fetched || 0;
            document.getElementById('stat-matched').textContent = data.keyword_matched || 0;
            document.getElementById('stat-new').textContent = (data.new_announcements || []).length;

            // Update pipeline
            document.getElementById('pipe-total').textContent = data.total_fetched || 0;
            document.getElementById('pipe-date').textContent = data.after_date_filter || 0;
            document.getElementById('pipe-keyword').textContent = data.keyword_matched || 0;
            document.getElementById('pipe-new').textContent = (data.new_announcements || []).length;
            document.getElementById('pipeline').classList.add('visible');

            // Status message
            const status = data.status === 'warning' ? 'warning' : 'success';
            const icon = data.status === 'warning' ? '⚠️' : '✅';
            const msg = data.message || `檢查完成（${data.timestamp}）`;
            showStatus(status, icon, msg);

            // Display announcements
            const announcements = data.all_matched || [];
            const listEl = document.getElementById('announcement-list');
            const sectionEl = document.getElementById('results-section');
            const emptyEl = document.getElementById('empty-state');
            const countEl = document.getElementById('result-count');

            if (announcements.length > 0) {
                countEl.textContent = announcements.length;
                listEl.innerHTML = announcements.map((ann, i) => `
                    <div class="announcement-card card-enter" style="animation-delay: ${i * 0.06}s">
                        <div class="ann-title">
                            ${ann.url
                                ? `<a href="${ann.url}" target="_blank" rel="noopener">${escapeHtml(ann.title)}</a>`
                                : escapeHtml(ann.title)
                            }
                        </div>
                        <div class="ann-meta">
                            <span class="ann-tag school">🏫 ${escapeHtml(ann.school)}</span>
                            ${(ann.matched_keywords || []).map(kw =>
                                `<span class="ann-tag keyword">🔑 ${escapeHtml(kw)}</span>`
                            ).join('')}
                            ${ann.date ? `<span class="ann-tag date">📅 ${escapeHtml(ann.date)}</span>` : ''}
                        </div>
                    </div>
                `).join('');
                sectionEl.style.display = 'block';
                emptyEl.style.display = 'none';
            } else {
                sectionEl.style.display = 'none';
                emptyEl.style.display = 'block';
                emptyEl.querySelector('h3').textContent = data.message || '本次沒有匹配到場地相關公告';
                emptyEl.querySelector('p').textContent = `最後檢查時間：${data.timestamp || '-'}`;
            }
        }

        function showStatus(type, icon, text) {
            const bar = document.getElementById('status-bar');
            bar.className = `status-bar ${type}`;
            bar.style.display = 'flex';
            document.getElementById('status-icon').textContent = icon;
            document.getElementById('status-text').textContent = text;
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
